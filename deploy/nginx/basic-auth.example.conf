# Exemple — HTTP Basic Auth (nginx)
# À inclure dans le bloc server { } — adapter auth_basic_user_file.
#
# Générer le fichier de mots de passe :
#   sudo apt install apache2-utils
#   sudo htpasswd -c /etc/nginx/.htpasswd-loyer mon_utilisateur
#
# Puis dans server { } :
#
#   auth_basic "Loyer Manager";
#   auth_basic_user_file /etc/nginx/.htpasswd-loyer;
#
# Placer auth_basic avant les blocs location { } pour protéger tout le site.

auth_basic "Loyer Manager";
auth_basic_user_file /etc/nginx/.htpasswd-loyer;
