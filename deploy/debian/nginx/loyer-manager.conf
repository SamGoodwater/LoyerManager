# Site Loyer Manager — nginx + php-fpm (Debian production)
# Copier vers /etc/nginx/sites-available/loyer-manager
# Puis : ln -s .../sites-available/loyer-manager /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name loyer.local localhost 127.0.0.1 _;

    root /var/www/LoyerManager;
    index index.html;

    # Logs (adapter les chemins si besoin)
    access_log /var/log/nginx/loyer-manager.access.log;
    error_log  /var/log/nginx/loyer-manager.error.log;

    # Fichiers statiques
    location / {
        try_files $uri $uri/ =404;
    }

    # API PHP
    location ~ ^/api\.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }

    # Sécurité — données et modèles uniquement via api.php
    location ~ ^/(data|templates)/ {
        deny all;
        return 403;
    }

    location ~ /config\.php$ {
        deny all;
        return 403;
    }

    location ~ /config\.example\.php$ {
        deny all;
        return 403;
    }

    location ~ /\. {
        deny all;
    }
}
