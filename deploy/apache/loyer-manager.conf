# Site Loyer Manager — Apache 2.4 + mod_php (Debian / WSL)
#
# Installation :
#   sudo ./deploy/scripts/install-apache.sh
#
# Ou manuellement :
#   sudo cp deploy/apache/loyer-manager.conf /etc/apache2/sites-available/loyer-manager.conf
#   sudo sed -i "s|@LOYER_ROOT@|/var/www/LoyerManager|g" /etc/apache2/sites-available/loyer-manager.conf
#   sudo a2ensite loyer-manager.conf
#   sudo a2dissite 000-default.conf
#   sudo a2enmod rewrite headers
#   sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName loyer.local
    ServerAlias localhost 127.0.0.1

    DocumentRoot @LOYER_ROOT@

    <Directory @LOYER_ROOT@>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # PHP via mod_php (fichiers .php à la racine, ex. api.php)
    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>

    DirectoryIndex index.html login.html

    ErrorDocument 404 /404.html

    ErrorLog ${APACHE_LOG_DIR}/loyer-manager-error.log
    CustomLog ${APACHE_LOG_DIR}/loyer-manager-access.log combined
</VirtualHost>
